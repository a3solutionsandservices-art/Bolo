AWSTemplateFormatVersion: "2010-09-09"
Description: "Bolo — Multi-tenant AI Voice Translation Platform on AWS ECS Fargate"

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

  AppName:
    Type: String
    Default: bolo

  DomainName:
    Type: String
    Description: "Root domain (e.g. bolo.com)"

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: "PostgreSQL master password"

  SecretKey:
    Type: String
    NoEcho: true
    Description: "FastAPI SECRET_KEY (64+ random chars)"

  SarvamApiKey:
    Type: String
    NoEcho: true
    Description: "Sarvam AI API subscription key"

  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: "OpenAI API key"

  StripeSecretKey:
    Type: String
    NoEcho: true
    Description: "Stripe secret key"

  BackendImage:
    Type: String
    Description: "ECR image URI for backend (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/bolo-backend:latest)"

  FrontendImage:
    Type: String
    Description: "ECR image URI for frontend"

  WorkerImage:
    Type: String
    Description: "ECR image URI for Celery worker (usually same as backend)"

Mappings:
  EnvConfig:
    production:
      DBInstanceClass: db.t3.medium
      CacheNodeType: cache.t3.small
      BackendDesiredCount: 2
      WorkerDesiredCount: 2
      FrontendDesiredCount: 2
    staging:
      DBInstanceClass: db.t3.micro
      CacheNodeType: cache.t3.micro
      BackendDesiredCount: 1
      WorkerDesiredCount: 1
      FrontendDesiredCount: 1

Resources:

  # ───────────────────────────────────────
  # VPC & Networking
  # ───────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-${Environment}-vpc"

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-public-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-public-2"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-private-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-private-2"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ───────────────────────────────────────
  # Security Groups
  # ───────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ALB inbound HTTP/HTTPS"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  BackendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Backend ECS tasks"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  FrontendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Frontend ECS tasks"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "RDS PostgreSQL"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref BackendSecurityGroup

  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ElastiCache Redis"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref BackendSecurityGroup

  # ───────────────────────────────────────
  # S3 Bucket (audio files & documents)
  # ───────────────────────────────────────
  AudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AppName}-${Environment}-audio-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: "expire-audio-180-days"
            Status: Enabled
            ExpirationInDays: 180
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ───────────────────────────────────────
  # RDS PostgreSQL
  # ───────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Bolo DB subnet group"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${AppName}-${Environment}-db"
      DBInstanceClass: !FindInMap [EnvConfig, !Ref Environment, DBInstanceClass]
      Engine: postgres
      EngineVersion: "16.2"
      MasterUsername: bolo
      MasterUserPassword: !Ref DBPassword
      DBName: bolo
      AllocatedStorage: 50
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: !If [IsProduction, true, false]
      BackupRetentionPeriod: 7
      DeletionProtection: !If [IsProduction, true, false]
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup

  # ───────────────────────────────────────
  # ElastiCache Redis (Celery broker + cache)
  # ───────────────────────────────────────
  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: "Bolo Redis subnet group"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: !Sub "${AppName}-${Environment}-redis"
      NumCacheClusters: !If [IsProduction, 2, 1]
      CacheNodeType: !FindInMap [EnvConfig, !Ref Environment, CacheNodeType]
      Engine: redis
      EngineVersion: "7.2"
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: true
      AutomaticFailoverEnabled: !If [IsProduction, true, false]
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      SecurityGroupIds:
        - !Ref CacheSecurityGroup

  # ───────────────────────────────────────
  # Secrets Manager
  # ───────────────────────────────────────
  AppSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/${Environment}/app-secrets"
      Description: "Bolo application secrets"
      SecretString: !Sub |
        {
          "SECRET_KEY": "${SecretKey}",
          "SARVAM_API_KEY": "${SarvamApiKey}",
          "OPENAI_API_KEY": "${OpenAIApiKey}",
          "STRIPE_SECRET_KEY": "${StripeSecretKey}",
          "DATABASE_URL": "postgresql+asyncpg://bolo:${DBPassword}@${Database.Endpoint.Address}:5432/bolo",
          "REDIS_URL": "rediss://:@${RedisCluster.PrimaryEndPoint.Address}:${RedisCluster.PrimaryEndPoint.Port}/0"
        }

  # ───────────────────────────────────────
  # ECS Cluster
  # ───────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AppName}-${Environment}"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 3
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ───────────────────────────────────────
  # IAM Roles
  # ───────────────────────────────────────
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AppSecrets

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GeneratePresignedUrl
                Resource:
                  - !Sub "${AudioBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt AudioBucket.Arn

  # ───────────────────────────────────────
  # CloudWatch Log Groups
  # ───────────────────────────────────────
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AppName}-${Environment}/backend"
      RetentionInDays: 30

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AppName}-${Environment}/worker"
      RetentionInDays: 30

  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AppName}-${Environment}/frontend"
      RetentionInDays: 14

  # ───────────────────────────────────────
  # ECS Task Definitions
  # ───────────────────────────────────────
  BackendTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AppName}-${Environment}-backend"
      Cpu: 1024
      Memory: 2048
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: !Ref BackendImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: AWS_S3_BUCKET
              Value: !Ref AudioBucket
            - Name: AWS_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: SECRET_KEY
              ValueFrom: !Sub "${AppSecrets}:SECRET_KEY::"
            - Name: SARVAM_API_KEY
              ValueFrom: !Sub "${AppSecrets}:SARVAM_API_KEY::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "${AppSecrets}:OPENAI_API_KEY::"
            - Name: STRIPE_SECRET_KEY
              ValueFrom: !Sub "${AppSecrets}:STRIPE_SECRET_KEY::"
            - Name: DATABASE_URL
              ValueFrom: !Sub "${AppSecrets}:DATABASE_URL::"
            - Name: REDIS_URL
              ValueFrom: !Sub "${AppSecrets}:REDIS_URL::"
          HealthCheck:
            Command: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 60

  WorkerTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AppName}-${Environment}-worker"
      Cpu: 2048
      Memory: 4096
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Ref WorkerImage
          Command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: worker
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: AWS_S3_BUCKET
              Value: !Ref AudioBucket
            - Name: AWS_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: SECRET_KEY
              ValueFrom: !Sub "${AppSecrets}:SECRET_KEY::"
            - Name: SARVAM_API_KEY
              ValueFrom: !Sub "${AppSecrets}:SARVAM_API_KEY::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "${AppSecrets}:OPENAI_API_KEY::"
            - Name: DATABASE_URL
              ValueFrom: !Sub "${AppSecrets}:DATABASE_URL::"
            - Name: REDIS_URL
              ValueFrom: !Sub "${AppSecrets}:REDIS_URL::"

  FrontendTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AppName}-${Environment}-frontend"
      Cpu: 512
      Memory: 1024
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: frontend
          Image: !Ref FrontendImage
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref FrontendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: frontend
          Environment:
            - Name: NEXT_PUBLIC_API_URL
              Value: !Sub "https://api.${DomainName}"
          HealthCheck:
            Command: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 30

  # ───────────────────────────────────────
  # Application Load Balancer
  # ───────────────────────────────────────
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AppName}-${Environment}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AppName}-${Environment}-backend-tg"
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "false"

  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AppName}-${Environment}-frontend-tg"
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref ACMCertificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup

  APIListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HTTPSListener
      Priority: 10
      Conditions:
        - Field: host-header
          Values: [!Sub "api.${DomainName}"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ───────────────────────────────────────
  # ACM Certificate
  # ───────────────────────────────────────
  ACMCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "*.${DomainName}"
      ValidationMethod: DNS

  # ───────────────────────────────────────
  # ECS Services
  # ───────────────────────────────────────
  BackendService:
    Type: AWS::ECS::Service
    DependsOn: APIListenerRule
    Properties:
      ServiceName: !Sub "${AppName}-${Environment}-backend"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTaskDef
      DesiredCount: !FindInMap [EnvConfig, !Ref Environment, BackendDesiredCount]
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups: [!Ref BackendSecurityGroup]
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 8000
          TargetGroupArn: !Ref BackendTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      EnableExecuteCommand: true

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${AppName}-${Environment}-worker"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref WorkerTaskDef
      DesiredCount: !FindInMap [EnvConfig, !Ref Environment, WorkerDesiredCount]
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups: [!Ref BackendSecurityGroup]
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200

  FrontendService:
    Type: AWS::ECS::Service
    DependsOn: HTTPSListener
    Properties:
      ServiceName: !Sub "${AppName}-${Environment}-frontend"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref FrontendTaskDef
      DesiredCount: !FindInMap [EnvConfig, !Ref Environment, FrontendDesiredCount]
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups: [!Ref FrontendSecurityGroup]
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: 3000
          TargetGroupArn: !Ref FrontendTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200

  # ───────────────────────────────────────
  # Auto Scaling
  # ───────────────────────────────────────
  AutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceAutoscaleRole

  BackendScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 10
      MinCapacity: !FindInMap [EnvConfig, !Ref Environment, BackendDesiredCount]
      ResourceId: !Sub "service/${ECSCluster}/${BackendService.Name}"
      RoleARN: !GetAtt AutoScalingRole.Arn
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  BackendCPUScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AppName}-${Environment}-backend-cpu"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref BackendScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 65.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Conditions:
  IsProduction: !Equals [!Ref Environment, production]

Outputs:
  LoadBalancerDNS:
    Description: "ALB DNS name — point your domain CNAME here"
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub "${AppName}-${Environment}-alb-dns"

  DatabaseEndpoint:
    Description: "RDS PostgreSQL endpoint"
    Value: !GetAtt Database.Endpoint.Address
    Export:
      Name: !Sub "${AppName}-${Environment}-db-endpoint"

  RedisEndpoint:
    Description: "ElastiCache Redis primary endpoint"
    Value: !GetAtt RedisCluster.PrimaryEndPoint.Address
    Export:
      Name: !Sub "${AppName}-${Environment}-redis-endpoint"

  AudioBucketName:
    Description: "S3 bucket for audio/document storage"
    Value: !Ref AudioBucket
    Export:
      Name: !Sub "${AppName}-${Environment}-audio-bucket"

  ECSClusterName:
    Description: "ECS cluster name"
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${AppName}-${Environment}-cluster"
