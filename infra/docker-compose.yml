services:
  postgres:
    image: postgres:16-alpine
    container_name: vaaniai-postgres
    environment:
      POSTGRES_USER: vaaniai
      POSTGRES_PASSWORD: vaaniai
      POSTGRES_DB: vaaniai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaaniai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaaniai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: vaaniai-backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://vaaniai:vaaniai@postgres:5432/vaaniai
      DATABASE_SYNC_URL: postgresql://vaaniai:vaaniai@postgres:5432/vaaniai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "true"
      UVICORN_WORKERS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_models:/app/models
      - audio_cache:/app/audio_cache
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: vaaniai-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://vaaniai:vaaniai@postgres:5432/vaaniai
      DATABASE_SYNC_URL: postgresql://vaaniai:vaaniai@postgres:5432/vaaniai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - postgres
      - backend
    volumes:
      - backend_models:/app/models
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        BACKEND_URL: http://backend:8000
    container_name: vaaniai-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: vaaniai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_models:
  audio_cache:
